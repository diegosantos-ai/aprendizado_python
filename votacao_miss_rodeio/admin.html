<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Administração - Miss do Rodeio</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { margin-bottom: 0.5em; }
        section { margin-bottom: 2em; }
        label { display: block; margin-top: 0.5em; }
        input, textarea, select { width: 100%; max-width: 400px; }
        table { border-collapse: collapse; width: 100%; margin-top: 1em; }
        th, td { border: 1px solid #ccc; padding: 0.5em; text-align: left; }
        .btn { margin-top: 1em; padding: 0.5em 1em; }
    </style>
</head>
<body>
    <h1>Área Administrativa</h1>

    <section id="cadastro-candidatas">
        <h2>Cadastro de Candidatas</h2>
        <form>
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" required />

            <label for="descricao">Descrição curta</label>
            <textarea id="descricao" name="descricao" rows="3" required></textarea>

            <label for="foto">Foto principal</label>
            <input id="foto" name="foto" type="file" accept="image/png, image/jpeg" required />

            <button class="btn" type="submit">Salvar candidata</button>
        </form>
    </section>

    <section id="gerenciar-votos">
        <h2>Gerenciar Votos</h2>
        <table>
            <thead>
                <tr><th>Candidata</th><th>Votos</th></tr>
            </thead>
            <tbody>
                <!-- Linhas de votação serão inseridas aqui dinamicamente -->
                <tr><td>Maria</td><td>120</td></tr>
                <tr><td>Ana</td><td>95</td></tr>
            </tbody>
        </table>
        <button class="btn" type="button">Exportar resultado CSV</button>
    </section>

    <section id="configuracoes-evento">
        <h2>Configurações do Evento</h2>
        <form>
            <label for="nome-evento">Nome do evento</label>
            <input id="nome-evento" name="nome-evento" type="text" />

            <label for="inicio">Início da votação</label>
            <input id="inicio" name="inicio" type="datetime-local" />

            <label for="fim">Fim da votação</label>
            <input id="fim" name="fim" type="datetime-local" />

            <label for="local">Local do rodeio</label>
            <input id="local" name="local" type="text" />

            <label for="banner">Banner</label>
            <input id="banner" name="banner" type="file" accept="image/png, image/jpeg" />

            <label for="links">Links (site, redes sociais)</label>
            <textarea id="links" name="links" rows="2"></textarea>

            <button class="btn" type="submit">Salvar configurações</button>
        </form>
    </section>
</body>
</html>
